<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibecoding 100days</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">vibecoding <span class="accent">100days</span></div>
    <p class="tagline">33 projects · 100 days · vibe-driven development</p>
  </header>

  <main>
    <section class="stats">
      <div class="stat">
        <span class="stat-value">
          Day <span id="daysElapsed">1</span>
        </span>
        <span class="stat-label">/ <span id="dayTotal">100</span></span>
      </div>
      <div class="stat">
        <span class="stat-value"><span id="projectsDone">0</span></span>
        <span class="stat-label">/ <span id="projectsTotal">33</span> projects</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
    </section>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="done">完成</button>
      <button class="filter-btn" data-filter="wip">进行中</button>
      <button class="filter-btn" data-filter="planned">计划中</button>
    </div>

    <section class="grid" id="projectGrid"></section>
  </main>

  <script src="projects.js"></script>
  <script src="main.js"></script>
</body>
</html>
